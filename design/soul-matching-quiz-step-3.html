<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@600;700&amp;family=Quicksand:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#7a2e1d",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-container-high": "#ffe2db",
                    "tertiary-fixed-dim": "#ffb1c4",
                    "on-secondary-fixed": "#002022",
                    "on-primary": "#ffffff",
                    "surface-variant": "#fadcd5",
                    "inverse-surface": "#3e2c28",
                    "on-tertiary": "#ffffff",
                    "surface-container-low": "#fff1ed",
                    "on-tertiary-fixed-variant": "#881645",
                    "on-primary-container": "#641e0e",
                    "background": "#fff8f6",
                    "on-background": "#281814",
                    "inverse-primary": "#ffb4a3",
                    "tertiary": "#a8315c",
                    "on-error-container": "#93000a",
                    "secondary-fixed-dim": "#73d5df",
                    "surface-tint": "#994531",
                    "primary": "#994531",
                    "secondary-container": "#90f2fc",
                    "surface-dim": "#f2d3cc",
                    "tertiary-fixed": "#ffd9e1",
                    "surface-container-highest": "#fadcd5",
                    "inverse-on-surface": "#ffede9",
                    "tertiary-container": "#fa719c",
                    "on-surface-variant": "#55433e",
                    "on-surface": "#281814",
                    "surface": "#fff8f6",
                    "primary-fixed-dim": "#ffb4a3",
                    "on-tertiary-container": "#700034",
                    "primary-fixed": "#ffdad2",
                    "outline-variant": "#dbc1bb",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#004f55",
                    "primary-container": "#e8836b",
                    "error": "#ba1a1a",
                    "surface-bright": "#fff8f6",
                    "secondary-fixed": "#90f2fc",
                    "on-primary-fixed": "#3d0600",
                    "on-tertiary-fixed": "#3f001a",
                    "surface-container": "#ffe9e4",
                    "secondary": "#006970",
                    "outline": "#88726d",
                    "on-secondary-container": "#006f77"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap-md": "16px",
                    "unit": "8px",
                    "stack-gap-lg": "32px",
                    "section-margin": "48px",
                    "container-padding": "24px",
                    "stack-gap-sm": "8px"
            },
            "fontFamily": {
                    "body-lg": ["Quicksand"],
                    "body-md": ["Quicksand"],
                    "headline-xl": ["Nunito Sans"],
                    "headline-sm": ["Nunito Sans"],
                    "headline-md": ["Nunito Sans"],
                    "headline-lg": ["Nunito Sans"],
                    "label-md": ["Quicksand"],
                    "headline-xl-mobile": ["Nunito Sans"],
                    "body-sm": ["Quicksand"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "headline-xl-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-bloom {
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .interest-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interest-card.active {
            background-color: #e8836b !important;
            color: #ffffff !important;
            transform: scale(0.95);
        }
        .floating-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(250, 113, 156, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(40px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 60px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen relative overflow-x-hidden">
<!-- Decorative Elements -->
<div class="floating-orb top-[-100px] right-[-50px]"></div>
<div class="floating-orb bottom-[-50px] left-[-100px]" style="animation-delay: -5s;"></div>
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 backdrop-blur-xl">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Soul Match Quiz</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-container-padding max-w-[600px] mx-auto min-h-screen flex flex-col">
<!-- Progress Section -->
<div class="mb-stack-gap-lg">
<div class="flex justify-between items-end mb-2">
<span class="font-label-md text-label-md text-primary font-bold">Step 3 of 4</span>
<span class="font-label-md text-label-md text-on-surface-variant">75% complete</span>
</div>
<div class="h-3 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container progress-bloom" style="width: 75%;"></div>
</div>
</div>
<!-- Question Header -->
<section class="mb-stack-gap-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-4 leading-tight">
                What topics resonate with you most right now?
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                Select at least three interests to help us find your perfect community matches.
            </p>
</section>
<!-- Interest Grid (Asymmetric Bento-ish Style) -->
<div class="grid grid-cols-2 gap-4 mb-stack-gap-lg" id="interests-container">
<!-- Mindfulness -->
<button class="interest-card col-span-2 flex items-center p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-on-secondary-container">self_improvement</span>
</div>
<div class="text-left">
<p class="font-headline-sm text-headline-sm">Mindfulness</p>
<p class="font-body-sm text-body-sm opacity-70">Daily presence and meditation</p>
</div>
</button>
<!-- Creative Arts -->
<button class="interest-card flex flex-col p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-tertiary-container">palette</span>
</div>
<p class="font-label-md text-label-md text-left">Creative Arts</p>
</button>
<!-- Career Growth -->
<button class="interest-card flex flex-col p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-primary-fixed-variant">trending_up</span>
</div>
<p class="font-label-md text-label-md text-left">Career Growth</p>
</button>
<!-- Nature -->
<button class="interest-card flex flex-col p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-10 h-10 rounded-full bg-secondary-fixed flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-secondary-fixed-variant">forest</span>
</div>
<p class="font-label-md text-label-md text-left">Nature</p>
</button>
<!-- Philosophy -->
<button class="interest-card flex flex-col p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant">history_edu</span>
</div>
<p class="font-label-md text-label-md text-left">Philosophy</p>
</button>
<!-- Mental Health Advocacy -->
<button class="interest-card col-span-2 flex items-center p-6 bg-surface-container-low rounded-lg shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent hover:border-primary-container/30" onclick="toggleInterest(this)">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-on-secondary-container">favorite</span>
</div>
<div class="text-left">
<p class="font-headline-sm text-headline-sm">Mental Health Advocacy</p>
<p class="font-body-sm text-body-sm opacity-70">Spreading awareness and care</p>
</div>
</button>
</div>
<!-- Action Area -->
<div class="mt-auto pt-8">
<button class="w-full bg-primary text-on-primary font-headline-sm py-4 px-6 rounded-full shadow-lg hover:scale-[1.02] active:scale-95 transition-all duration-300 opacity-50 cursor-not-allowed" id="continue-btn">
                Continue to Final Step
            </button>
</div>
</main>
<!-- Bottom Navigation (Suppressed based on Transactional Flow logic, but we can add a simple hint) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-full max-w-[400px] px-6">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl p-2 rounded-full shadow-[0px_8px_24px_rgba(92,71,66,0.08)] flex justify-center text-on-surface-variant font-label-md">
            Need help? <a class="ml-1 text-primary underline" href="#">Skip for now</a>
</div>
</div>
<script>
        let selectedCount = 0;
        const continueBtn = document.getElementById('continue-btn');

        function toggleInterest(element) {
            element.classList.toggle('active');
            const isActive = element.classList.contains('active');

            // Interaction Feedback
            if (isActive) {
                selectedCount++;
                const icon = element.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 1";
            } else {
                selectedCount--;
                const icon = element.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            }

            // Update Continue Button State
            if (selectedCount >= 3) {
                continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                continueBtn.classList.add('cursor-pointer');
                continueBtn.removeAttribute('disabled');
            } else {
                continueBtn.classList.add('opacity-50', 'cursor-not-allowed');
                continueBtn.setAttribute('disabled', 'true');
            }
        }

        // Initialize state
        continueBtn.setAttribute('disabled', 'true');
    </script>
</body></html>
