<style>

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Soul Match Quiz</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-grow pt-24 pb-12 px-container-padding max-w-[600px] mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-stack-gap-lg">
<div class="flex justify-between items-center mb-2">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Step 2 of 4</span>
<span class="font-label-md text-label-md text-primary font-bold">50% Complete</span>
</div>
<div class="w-full h-3 bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-1/2 bg-primary-container relative">
<div class="absolute inset-0 progress-shimmer"></div>
</div>
</div>
</div>
<!-- Question Header -->
<div class="mb-stack-gap-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-4">Communication Style</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">How do you prefer to connect with your significant other?</p>
</div>
<!-- Options Container -->
<div class="space-y-stack-gap-md mb-stack-gap-lg">
<!-- Option 1 -->
<button class="option-card w-full p-6 bg-surface-container-low text-left rounded-lg transition-all duration-300 hover:shadow-[0px_8px_24px_rgba(92,71,66,0.08)] flex items-center justify-between group" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">Deep Conversations</span>
<span class="font-body-sm text-body-sm text-on-surface-variant group-[.selected]:text-white/80">Exploring philosophical ideas and emotions.</span>
</div>
</div>
<span class="material-symbols-outlined opacity-0 group-[.selected]:opacity-100 transition-opacity">check_circle</span>
</button>
<!-- Option 2 -->
<button class="option-card w-full p-6 bg-surface-container-low text-left rounded-lg transition-all duration-300 hover:shadow-[0px_8px_24px_rgba(92,71,66,0.08)] flex items-center justify-between group" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-white transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<div>
<span class="font-headline-sm text-headline-sm block">Shared Silence</span>
<span class="font-body-sm text-body-sm text-on-surface-variant group-[.selected]:text-white/80">Feeling peace simply being in the same room.</span>
</div>
</div>
<span class="material-symbols-outlined opacity-0 group-[.selected]:opacity-100 transition-opacity">check_circle</span>
</button>
<!-- Option 3 -->
<button class="option-card w-full p-6 bg-surface-container-low text-left rounded-lg transition-all duration-300 hover:shadow-[0px_8px_24px_rgba(92,71,66,0.08)] flex items-center justify-between group" onclick="selectOption(this)">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-primary group-hover:bg-primary-container group-hover:text-white transition-colors">

</div>
<div>

<span class="font-body-sm text-body-sm text-on-surface-variant group-[.selected]:text-white/80">Keeping in touch with small updates through the day.</span>
</div>
</div>
<span class="material-symbols-outlined opacity-0 group-[.selected]:opacity-100 transition-opacity">check_circle</span>
</button>

</div>
</div>
<span class="material-symbols-outlined opacity-0 group-[.selected]:opacity-100 transition-opacity">check_circle</span>

<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex items-end p-6">
<p class="text-white font-label-md italic">"Connection is the energy that exists between people when they feel seen, heard, and valued."</p>
</div>
</div>

<div class="flex flex-col gap-4">
<button class="w-full py-5 rounded-full bg-primary-container text-on-primary-container font-headline-sm shadow-[0px_8px_24px_rgba(153,69,49,0.2)] hover:shadow-[0px_12px_32px_rgba(153,69,49,0.3)] disabled:opacity-50 disabled:shadow-none transition-all duration-300 active:scale-95 flex items-center justify-center gap-2" disabled="" id="next-button">
                Continue to Step 3

</button>
<p class="text-center font-body-sm text-outline">You can always change your answers later.</p>

</main>
<script>
        function selectOption(element) {
            // Remove selection from all options
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('selected');
                card.classList.remove('bg-primary-container');
                card.classList.remove('text-white');
                card.classList.add('bg-surface-container-low');
            });

            // Add selection to clicked element
            element.classList.add('selected');
            element.classList.remove('bg-surface-container-low');
            element.classList.add('bg-primary-container');
            element.classList.add('text-white');

            // Enable the next button
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;

            // Subtle vibration feedback if supported
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
