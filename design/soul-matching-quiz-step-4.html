<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Soul Match Quiz - InnerBloom</title>

<!-- Load Tailwind Config -->

                "on-primary": "#ffffff",
                "surface-variant": "#fadcd5",
                "inverse-surface": "#3e2c28",
                "on-tertiary": "#ffffff",
                "surface-container-low": "#fff1ed",
                "on-tertiary-fixed-variant": "#881645",
                "on-primary-container": "#641e0e",
                "background": "#fff8f6",
                "on-background": "#281814",
                "inverse-primary": "#ffb4a3",
                "tertiary": "#a8315c",
                "on-error-container": "#93000a",
                "secondary-fixed-dim": "#73d5df",
                "surface-tint": "#994531",
                "primary": "#994531",
                "secondary-container": "#90f2fc",
                "surface-dim": "#f2d3cc",
                "tertiary-fixed": "#ffd9e1",
                "surface-container-highest": "#fadcd5",
                "inverse-on-surface": "#ffede9",
                "tertiary-container": "#fa719c",
                "on-surface-variant": "#55433e",
                "on-surface": "#281814",
                "surface": "#fff8f6",
                "primary-fixed-dim": "#ffb4a3",
                "on-tertiary-container": "#700034",
                "primary-fixed": "#ffdad2",
                "outline-variant": "#dbc1bb",
                "on-secondary": "#ffffff",
                "on-secondary-fixed-variant": "#004f55",

                "error": "#ba1a1a",
                "surface-bright": "#fff8f6",
                "secondary-fixed": "#90f2fc",
                "on-primary-fixed": "#3d0600",
                "on-tertiary-fixed": "#3f001a",
                "surface-container": "#ffe9e4",
                "secondary": "#006970",

            },
            "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
            },
            "spacing": {
                "stack-gap-md": "16px",
                "unit": "8px",
                "stack-gap-lg": "32px",
                "section-margin": "48px",
                "container-padding": "24px",
                "stack-gap-sm": "8px"
            },
            "fontFamily": {
                "body-lg": ["Quicksand"],
                "body-md": ["Quicksand"],
                "headline-xl": ["Nunito Sans"],
                "headline-sm": ["Nunito Sans"],
                "headline-md": ["Nunito Sans"],
                "headline-lg": ["Nunito Sans"],
                "label-md": ["Quicksand"],
                "headline-xl-mobile": ["Nunito Sans"],
                "body-sm": ["Quicksand"]
            },
            "fontSize": {
                "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
                "headline-xl-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0px 8px 24px rgba(92, 71, 66, 0.08);
        }
        .option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.96);
        }
        .progress-bloom {
            width: 100%;
            height: 6px;
            background: #ffe9e4;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bloom-inner {
            height: 100%;
            background: #e8836b;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar from JSON Authority -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Soul Match Quiz</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 px-container-padding pb-32 max-w-lg mx-auto w-full">
<!-- Progress Section -->
<div class="mt-8 mb-10">
<div class="flex justify-between items-end mb-3">
<span class="font-label-md text-label-md text-on-surface-variant">Step 4 of 4</span>
<span class="font-headline-sm text-headline-sm text-primary font-bold">100%</span>
</div>
<div class="progress-bloom">
<div class="progress-bloom-inner" id="progressBar"></div>
</div>
</div>
<!-- Question Header -->
<div class="mb-10">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-4 leading-tight">
                What is your primary goal for this connection?
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                This helps us find the most compatible souls who share your intentions for growth and connection.
            </p>
</div>
<!-- Quiz Options - Asymmetric Grid Layout -->
<div class="grid grid-cols-1 gap-4" id="optionsContainer">
<!-- Option 1: Mutual Support -->
<button class="option-card group relative overflow-hidden flex items-center p-6 bg-surface-container-low rounded-lg soft-shadow text-left border-2 border-transparent hover:border-primary-container/30" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-primary" data-icon="favorite">favorite</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Mutual Support</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Emotional safety and gentle encouragement.</p>
</div>
<div class="ml-auto opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary fill-current" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2: Shared Learning -->
<button class="option-card group relative overflow-hidden flex items-center p-6 bg-surface-container-low rounded-lg soft-shadow text-left border-2 border-transparent hover:border-primary-container/30" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-full bg-secondary-container/30 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-secondary" data-icon="auto_stories">auto_stories</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Shared Learning</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Growing together through books and dialogue.</p>
</div>
<div class="ml-auto opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary fill-current" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3: Accountability Partner -->
<button class="option-card group relative overflow-hidden flex items-center p-6 bg-surface-container-low rounded-lg soft-shadow text-left border-2 border-transparent hover:border-primary-container/30" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-full bg-tertiary-container/20 flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-tertiary" data-icon="bolt">bolt</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Accountability Partner</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Keeping each other focused on personal goals.</p>
</div>
<div class="ml-auto opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary fill-current" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 4: Friendly Presence -->
<button class="option-card group relative overflow-hidden flex items-center p-6 bg-surface-container-low rounded-lg soft-shadow text-left border-2 border-transparent hover:border-primary-container/30" onclick="selectOption(this)">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mr-4 shrink-0 transition-transform group-hover:rotate-12">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="sentiment_satisfied">sentiment_satisfied</span>
</div>
<div>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Friendly Presence</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Low-pressure friendship and warm company.</p>
</div>
<div class="ml-auto opacity-0 group-[.selected]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary fill-current" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Decorative Illustration -->
<div class="mt-12 flex justify-center opacity-40">
<div class="w-32 h-32 rounded-full bg-gradient-to-tr from-primary-container/20 to-secondary-container/20 blur-2xl animate-pulse"></div>
</div>
</main>
<!-- Floating Footer Action Area -->
<footer class="fixed bottom-0 left-0 w-full p-container-padding pb-8 bg-gradient-to-t from-surface via-surface to-transparent pt-12 z-40">
<div class="max-w-lg mx-auto">
<button class="w-full h-16 rounded-full bg-primary-container text-on-primary-container font-headline-sm flex items-center justify-center gap-2 shadow-lg disabled:opacity-50 disabled:grayscale transition-all duration-300 active:scale-95" disabled="" id="ctaButton">
<span>Find My Kindred Spirits</span>
<span class="material-symbols-outlined" data-icon="sparkles">colors_spark</span>
</button>
</div>
</footer>
<script>
        // Animate Progress Bar on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('progressBar').style.width = '100%';
            }, 300);
        });

        // Toggle Selection Logic
        function selectOption(el) {
            const container = document.getElementById('optionsContainer');
            const options = container.getElementsByClassName('option-card');
            const cta = document.getElementById('ctaButton');

            // Toggle logic: Only one selected at a time for this quiz type
            Array.from(options).forEach(opt => {
                if (opt !== el) {
                    opt.classList.remove('selected', 'bg-primary-fixed', 'border-primary-container');
                    opt.classList.add('bg-surface-container-low', 'border-transparent');
                }
            });

            const isSelected = el.classList.contains('selected');
            if (isSelected) {
                el.classList.remove('selected', 'bg-primary-fixed', 'border-primary-container');
                el.classList.add('bg-surface-container-low', 'border-transparent');
                cta.disabled = true;
            } else {
                el.classList.add('selected', 'bg-primary-fixed', 'border-primary-container');
                el.classList.remove('bg-surface-container-low', 'border-transparent');
                cta.disabled = false;

                // Add a little celebratory "pop" sound/haptic feel would go here
            }
        }
    </script>
</body></html>
