<style>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary">Soul Match Quiz</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors duration-300 active:scale-95 text-primary">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-container-padding max-w-[600px] mx-auto w-full">
<!-- Progress Section -->
<div class="mb-stack-gap-lg">
<div class="flex justify-between items-center mb-stack-gap-sm">
<span class="font-label-md text-label-md text-on-surface-variant">Step 1 of 4</span>
<span class="font-label-md text-label-md text-primary font-bold">25%</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/4 rounded-full progress-glow transition-all duration-700 ease-out"></div>
</div>
</div>
<!-- Question Header -->
<section class="mb-stack-gap-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-gap-sm leading-tight">
                How would you describe your current emotional energy?
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                Take a deep breath. There are no wrong answers, only your unique truth in this moment.
            </p>
</section>
<!-- Options Bento/Grid -->
<div class="grid grid-cols-1 gap-stack-gap-md" id="quiz-options">
<!-- Option 1 -->
<button class="group relative flex items-center gap-4 p-5 bg-surface-container-low rounded-lg transition-all duration-300 hover:bg-surface-container shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent text-left overflow-hidden" onclick="selectOption(this)">
<div class="w-12 h-12 flex-shrink-0 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="wb_sunny">wb_sunny</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Radiant &amp; Social</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Feeling vibrant and ready to connect with others.</p>
</div>
</button>
<!-- Option 2 -->
<button class="group relative flex items-center gap-4 p-5 bg-surface-container-low rounded-lg transition-all duration-300 hover:bg-surface-container shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent text-left overflow-hidden" onclick="selectOption(this)">
<div class="w-12 h-12 flex-shrink-0 rounded-full bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed-variant transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="nights_stay">nights_stay</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Quiet &amp; Reflective</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Turning inward for peace and gentle observation.</p>
</div>
</button>
<!-- Option 3 -->
<button class="group relative flex items-center gap-4 p-5 bg-surface-container-low rounded-lg transition-all duration-300 hover:bg-surface-container shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent text-left overflow-hidden" onclick="selectOption(this)">
<div class="w-12 h-12 flex-shrink-0 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="self_improvement">self_improvement</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Healing &amp; Introspective</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Focusing on personal growth and emotional mending.</p>
</div>
</button>
<!-- Option 4 -->
<button class="group relative flex items-center gap-4 p-5 bg-surface-container-low rounded-lg transition-all duration-300 hover:bg-surface-container shadow-[0px_8px_24px_rgba(92,71,66,0.08)] border-2 border-transparent text-left overflow-hidden" onclick="selectOption(this)">
<div class="w-12 h-12 flex-shrink-0 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-fixed-variant transition-transform group-hover:scale-110">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex-grow">

</div>
</button>

<p class="font-body-sm text-body-sm text-on-surface-variant italic">"Your energy is your unique signature today."</p>
</div>

<!-- Fixed Bottom Actions -->
<footer class="fixed bottom-0 left-0 w-full p-container-padding bg-surface/90 backdrop-blur-xl flex flex-col gap-4">
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-bold text-body-lg flex items-center justify-center gap-2 opacity-50 cursor-not-allowed transition-all duration-300 active:scale-95 shadow-lg" disabled="" id="continue-btn">
            Continue
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center font-label-md text-label-md text-outline">You can update your energy profile anytime</p>
</footer>
<script>
        function selectOption(element) {
            // Remove selection from all other options
            const options = document.querySelectorAll('#quiz-options button');
            options.forEach(opt => {
                opt.classList.remove('quiz-card-selected');
                opt.classList.add('bg-surface-container-low');
            });

            // Add selection to clicked element
            element.classList.add('quiz-card-selected');
            element.classList.remove('bg-surface-container-low');

            // Enable continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = false;
            continueBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            continueBtn.classList.add('hover:bg-on-primary-fixed-variant');

            // Micro-interaction: Subtle vibration/feedback
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // Initialize progress bar animation
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-primary.w-1\\/4');
            setTimeout(() => {
                progressBar.style.width = '25%';
            }, 100);
        });
    </script>
